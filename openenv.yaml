standard: "OpenEnv v1.0"
name: "shop-scheduler-env"
version: "1.0.0"
description: "A manufacturing production scheduling environment for agentic evaluation."
domain: "manufacturing"
publisher: "TEAM RYFIO"

tasks:
  - id: "easy_single_machine"
    name: "Easy: Single Machine"
    difficulty: "easy"
    description: "Optimize 5 jobs on 1 machine."
    grader: "grader:grade"
  - id: "medium_parallel_changeover"
    name: "Medium: Parallel Changeover"
    difficulty: "medium"
    description: "Two machines with setup times."
    grader: "grader:grade"
  - id: "hard_dynamic_arrivals"
    name: "Hard: Dynamic Arrivals"
    difficulty: "hard"
    description: "Adapt to new jobs arriving at runtime."
    grader: "grader:grade"

app:
  port: 7860
  runtime: "python"
  entrypoint: "server/app.py"
