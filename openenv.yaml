spec_version: 1
name: open-shop-scheduler
type: environment
runtime: docker
app: server/app.py
port: 7860

metadata:
  title: "Open Shop Scheduler AI"
  description: "Meta PyTorch Hackathon: Optimizing manufacturing scheduling with RL."
  version: "1.0.0"

endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
  tasks: "/tasks"
  grade: "/grade"

tasks:
  - id: easy_single_machine
    name: "Easy: Single Machine"
    description: "Basic scheduling task."
    pass_criterion: "score >= 0.7"
    difficulty: easy
  - id: medium_parallel_changeover
    name: "Medium: Parallel"
    description: "Machines with changeovers."
    pass_criterion: "score >= 0.6"
    difficulty: medium
  - id: hard_dynamic_arrivals
    name: "Hard: Dynamic"
    description: "Real-time task arrivals."
    pass_criterion: "score >= 0.5"
    difficulty: hard
