spec_version: "1"
name: "shop-scheduler-env"
version: "1.0.0"

tasks:
  - id: "easy_single_machine"
    name: "Easy: Single Machine Scheduling"
    description: "Solve a basic scheduling task on a single machine with changeovers."
    grader: "grader:grade"
  - id: "medium_parallel_changeover"
    name: "Medium: Parallel Changeover"
    description: "Optimize scheduling across parallel machines with job-specific setup times."
    grader: "grader:grade"
  - id: "hard_dynamic_arrivals"
    name: "Hard: Dynamic Arrivals"
    description: "Manage complex scheduling scenarios with jobs arriving dynamically at runtime."
    grader: "grader:grade"

app:
  port: 7860
  runtime: "python"
  entrypoint: "server/app.py"
